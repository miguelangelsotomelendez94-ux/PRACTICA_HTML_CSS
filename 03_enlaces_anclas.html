<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace</title>
</head>
<body>
    <!-- Los enlaces o anclas o hiperviculos -->
    <!-- a (anchor) significa ancla. Metafora: como en un barco te mantiene en una ubicacion especifica un ancla es justamente para que el usuario sepa hacia donde buscar un recurso o hacia donde navegar en la pagina web. -->

    <!-- Los atributos son caracteristicas que define el comportamiento y la apariencia de los elementos en este caso el atributo href vuelve funcional a la etiqueta es por esta razon que su utiliza en el maquetado y no en el dado que no es una caracteristica visual -->

    <!-- href (hyper reference) es la referencia a un recurso, esvdecir, el destino del enlace. -->
    <!-- Lo que esta dentro de la etiqueta  a es el texto visible que el usuario vera en la pagina web. Mientra que lo que esta dentro de hrefes la referencia al recurso al que apunta el enlace. -->
     <h2 title="titulo de la pagina " > Enlaces o Ancla </h2>
    <!-- por otra parte, el atributo title propociona un textode ayuda que se muestra cuando el usuario pasa el mouse sobre el enlace. Las tecnologias de asistencia como lectores de pantalla utiliza este atributo para proporcionar informacion adicional al usuario. En el caso de persona invidentes esto les permite acceder  a informacion adicional sobre el enlace. -->
    <a href="https://www.google.com">google</a>
    <br>
    <a href="https://www.facebook.com">facebook</a>
    <br>
    <a href="https://www.youtube.com">youtube</a>
    <br>
    <a title="ir al canal de youtube" href="//youtube.com/@ramcrack0584" >Ramcrack</a>  <!-- Mala practica: usar protocolo relativo sin especificar eln protocolo -->
    <br>
    <br>
    <a href="03-1_pagina_enlace1.html"> ir a enlace uno </a>
    <br>
    <a href="03-2_pagina_enlace2.html"> ir a enlace dos </a>
    <br>
    <a href="03-3_pagina_enlace3.html"> ir a enlace tre </a>
     <!--  Es sumamente importante que en la programacion y el desarrollo web se realicen las practicas amedida que se va avanzando, de forma se asegura una mejor comprenon y aplicacion de los conceptos. Entiendan que la programacion es un proceso activo no pasivo, una cosa es intentar comprender lo que sucede cuando leen o ven algo que se esta haciendo, sin embargo, la unica forma de aprender es probando ustedes mismo todo lo que se debe implementar -->
    <br>

    <h2>Enlaces con target a otra ventana</h2>
    <a href="03-4_pagina_enlace4.html" target="_blank">Ir a enlace cuatro en nueva ventana</a>
     <!-- El atributo target="_blank" abre el enlace en una nueva ventana o pestaña del navegador. 
Por defecto siempre está en self que significa que se abre en la misma ventana -->


</body>
</html>
